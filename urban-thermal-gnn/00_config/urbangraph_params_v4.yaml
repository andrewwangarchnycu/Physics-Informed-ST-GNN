# V4 training config — real-geometry + real-IoT dataset.
# dim_air=9 matches the best existing model (V2/Ts); the 9th feature
# (surface temperature) is computed internally by dataset.py, so no extra
# stored field is required.
model:
  dim_air: 9
  hidden_dim: 128
  n_rgcn_layers: 3
  lstm_hidden: 256
  out_timesteps: 11

training:
  lr: 0.001
  weight_decay: 0.0001
  max_epochs: 200
  early_stopping_patience: 25
  batch_size: 1
  lambda_sensing: 0.5    # weight on real-IoT sensor_utci direct supervision
